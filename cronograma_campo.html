<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cronograma de campo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-2: #5c5c58;
    --text-3: #9c9c96;
    --blue: #1a5fd4;
    --blue-light: #ddeafc;
    --blue-mid: #4a82e0;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .app { max-width: 420px; margin: 0 auto; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; }

  /* HEADER */
  .top-bar { padding: 1.25rem 1.25rem 1rem; background: var(--surface); border-bottom: 0.5px solid var(--border); }
  .top-bar h1 { font-size: 17px; font-weight: 500; color: var(--text); }
  .top-bar p { font-size: 13px; color: var(--text-2); margin-top: 2px; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0.875rem; }
  .stat { background: var(--surface); border-radius: var(--radius-sm); padding: 0.875rem 1rem; border: 0.5px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-val { font-size: 26px; font-weight: 500; color: var(--text); margin-top: 2px; line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--text-2); margin-top: 3px; }
  .prog-wrap { padding: 0 0.875rem 0.5rem; }
  .prog-bar { height: 6px; border-radius: 3px; background: rgba(0,0,0,0.08); overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; background: var(--blue); transition: width 0.5s; }

  /* SECTION TITLE */
  .sec { font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; padding: 0.75rem 0.875rem 0.375rem; }

  /* ENC LIST */
  .enc-list { padding: 0 0.875rem 1rem; display: flex; flex-direction: column; gap: 7px; }
  .enc-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1rem; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.12s, transform 0.1s; }
  .enc-card:active { transform: scale(0.985); }
  .enc-card:hover { background: #fafaf8; }
  .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .enc-info { flex: 1; min-width: 0; }
  .enc-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .enc-zona { font-size: 12px; color: var(--text-2); margin-top: 1px; }
  .enc-right { text-align: right; flex-shrink: 0; }
  .cnt { font-size: 18px; font-weight: 500; color: var(--text); }
  .cnt-sub { font-size: 11px; color: var(--text-3); }
  .mini-bar { height: 3px; border-radius: 2px; background: rgba(0,0,0,0.08); overflow: hidden; margin-top: 5px; width: 52px; margin-left: auto; }
  .mini-fill { height: 100%; border-radius: 2px; }

  /* DETAIL HEADER */
  .det-header { padding: 1rem; background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .back-btn { background: none; border: 0.5px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); font-size: 18px; flex-shrink: 0; transition: background 0.1s; }
  .back-btn:hover { background: var(--bg); }
  .avatar-lg { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; flex-shrink: 0; }
  .det-name { font-size: 16px; font-weight: 500; color: var(--text); }
  .det-zona { font-size: 12px; color: var(--text-2); margin-top: 1px; }

  /* SELECTED BANNER */
  .sel-banner { margin: 0 0.875rem 0.5rem; border-radius: var(--radius); padding: 1rem 1.25rem; background: var(--blue-light); border: 1px solid rgba(26,95,212,0.2); }
  .sel-banner .sb-lbl { font-size: 12px; color: var(--blue); margin-bottom: 3px; }
  .sel-banner .sb-time { font-size: 26px; font-weight: 500; color: #0c3d8a; line-height: 1; }
  .sel-banner .sb-meta { font-size: 13px; color: var(--blue-mid); margin-top: 4px; }
  .sel-banner.libre { background: rgba(0,0,0,0.04); border-color: var(--border); }
  .sel-banner.libre .sb-lbl { color: var(--text-3); }
  .sel-banner.libre .sb-time { font-size: 20px; color: var(--text-3); font-weight: 400; }

  /* WEEK GRID */
  .week-grid { padding: 0 0.875rem 1rem; display: flex; flex-direction: column; gap: 5px; }
  .day-row { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 0.55rem 0.875rem; display: flex; align-items: center; cursor: pointer; transition: background 0.1s; }
  .day-row:active { transform: scale(0.99); }
  .day-row.no-shift { opacity: 0.42; }
  .day-row.selected { border: 1.5px solid var(--blue); background: var(--blue-light); }
  .day-row.no-shift.selected { background: rgba(0,0,0,0.04); border-color: var(--border-strong); opacity: 1; }
  .day-date { font-size: 12px; color: var(--text-2); width: 54px; flex-shrink: 0; }
  .day-row.selected .day-date { color: var(--blue); font-weight: 500; }
  .day-shift { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
  .day-row.selected .day-shift { color: #0c3d8a; }
  .libre-txt { color: var(--text-3); font-weight: 400; }
  .day-casos { font-size: 12px; color: var(--text-2); }
  .day-row.selected .day-casos { color: var(--blue-mid); }
  .tipo-pill { font-size: 10px; border-radius: 4px; padding: 2px 7px; margin: 0 6px; flex-shrink: 0; }
  .day-row.selected .tipo-pill { background: rgba(26,95,212,0.15) !important; color: #0c3d8a !important; }
  .chev { font-size: 14px; color: var(--text-3); margin-left: 4px; flex-shrink: 0; }
  .day-row.selected .chev { color: var(--blue); }

  /* NAV */
  .nav { display: flex; background: var(--surface); border-top: 0.5px solid var(--border); position: sticky; bottom: 0; }
  .nav button { flex: 1; background: none; border: none; padding: 10px 0 8px; cursor: pointer; font-size: 11px; color: var(--text-3); font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.1s; }
  .nav button i { font-size: 21px; }
  .nav button.active { color: var(--blue); }

  /* ADMIN */
  .pin-screen { padding: 3rem 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .pin-screen h2 { font-size: 17px; font-weight: 500; }
  .pin-input { font-size: 22px; text-align: center; letter-spacing: 0.35em; width: 150px; padding: 10px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--surface); font-family: inherit; color: var(--text); outline: none; }
  .pin-input:focus { border-color: var(--blue); }
  .pin-error { font-size: 13px; color: #b52a2a; min-height: 18px; }
  .admin-wrap { padding: 0.875rem; display: flex; flex-direction: column; gap: 8px; }
  .admin-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .admin-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; color: var(--text); }
  .admin-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .admin-row label { font-size: 13px; color: var(--text-2); flex: 1; line-height: 1.3; }
  .admin-row input[type=number] { width: 68px; font-size: 16px; text-align: center; padding: 6px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); font-family: inherit; color: var(--text); background: var(--surface); outline: none; }
  .admin-row input:focus { border-color: var(--blue); }
  .save-btn { width: 100%; margin-top: 6px; padding: 11px; font-size: 14px; font-family: inherit; background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; transition: opacity 0.1s; }
  .save-btn:hover { opacity: 0.88; }
  .link-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
  .link-row:last-of-type { border-bottom: none; }
  .save-msg { font-size: 12px; color: #2e7d32; text-align: center; margin-top: 8px; min-height: 16px; }

  .content-scroll { flex: 1; overflow-y: auto; }
</style>
</head>
<body>
<div class="app">
  <div class="content-scroll" id="content"></div>
  <nav class="nav">
    <button id="nav-enc" class="active" onclick="goList()"><i class="ti ti-users"></i>Encuestadores</button>
    <button id="nav-adm" onclick="goAdmin()"><i class="ti ti-settings"></i>Coordinador</button>
  </nav>
</div>

<script>
const DIAS = [
  { key:"vie1", label:"Vie 12/6", full:"Viernes 12 de junio" },
  { key:"sab1", label:"Sab 13/6", full:"Sábado 13 de junio" },
  { key:"dom",  label:"Dom 14/6", full:"Domingo 14 de junio" },
  { key:"mar",  label:"Mar 16/6", full:"Martes 16 de junio" },
  { key:"mie",  label:"Mie 17/6", full:"Miércoles 17 de junio" },
  { key:"jue",  label:"Jue 18/6", full:"Jueves 18 de junio" },
  { key:"vie2", label:"Vie 19/6", full:"Viernes 19 de junio" },
  { key:"sab2", label:"Sab 20/6", full:"Sábado 20 de junio" }
];

const TODAY_KEY = "vie1";

const ENC = [
  { id:1, nombre:"Encuestador 1", zona:"Boedo", obj:140, hechas:0,
    color:{ bg:"#ddeafc", text:"#1a5fd4" },
    turnos:{ vie1:{h:"20 a 00",t:"N",c:15}, sab1:{h:"00 a 4",t:"N",c:15}, dom:{h:"20 a 1",t:"N",c:20}, mar:{h:"20 a 1",t:"N",c:20}, mie:{h:"20 a 1",t:"N",c:20}, jue:{h:"20 a 1",t:"N",c:20}, vie2:{h:"00 a 4",t:"N",c:15}, sab2:{h:"20 a 00",t:"N",c:15} }
  },
  { id:2, nombre:"Encuestador 2", zona:"Boedo", obj:60, hechas:0,
    color:{ bg:"#d8f0e0", text:"#2d7a4f" },
    turnos:{ vie1:{h:"20 a 00",t:"N",c:15}, sab1:{h:"00 a 4",t:"N",c:15}, dom:null, mar:null, mie:null, jue:null, vie2:{h:"00 a 4",t:"N",c:15}, sab2:{h:"20 a 00",t:"N",c:15} }
  },
  { id:3, nombre:"Encuestador 3", zona:"Palermo", obj:140, hechas:0,
    color:{ bg:"#ece8fe", text:"#5b3ecb" },
    turnos:{ vie1:{h:"00 a 4",t:"N",c:15}, sab1:{h:"20 a 00",t:"N",c:15}, dom:{h:"20 a 1",t:"N",c:20}, mar:{h:"20 a 1",t:"N",c:20}, mie:{h:"20 a 1",t:"N",c:20}, jue:{h:"20 a 1",t:"N",c:20}, vie2:{h:"20 a 00",t:"N",c:15}, sab2:{h:"00 a 4",t:"N",c:15} }
  },
  { id:4, nombre:"Encuestador 4", zona:"Palermo", obj:60, hechas:0,
    color:{ bg:"#fdefd6", text:"#a05e10" },
    turnos:{ vie1:{h:"00 a 4",t:"N",c:15}, sab1:{h:"20 a 00",t:"N",c:15}, dom:null, mar:null, mie:null, jue:null, vie2:{h:"20 a 00",t:"N",c:15}, sab2:{h:"00 a 4",t:"N",c:15} }
  },
  { id:5, nombre:"Encuestador 5", zona:"Núñez", obj:140, hechas:0,
    color:{ bg:"#fce8f0", text:"#a02060" },
    turnos:{ vie1:{h:"20 a 00",t:"N",c:15}, sab1:{h:"00 a 4",t:"N",c:15}, dom:{h:"14 a 19",t:"D",c:12}, mar:{h:"20 a 1",t:"N",c:22}, mie:{h:"20 a 1",t:"N",c:23}, jue:{h:"20 a 1",t:"N",c:23}, vie2:{h:"00 a 4",t:"N",c:15}, sab2:{h:"20 a 00",t:"N",c:15} }
  },
  { id:6, nombre:"Encuestador 6", zona:"Núñez", obj:60, hechas:0,
    color:{ bg:"#fce8e8", text:"#a02020" },
    turnos:{ vie1:{h:"20 a 00",t:"N",c:15}, sab1:{h:"00 a 4",t:"N",c:15}, dom:null, mar:null, mie:null, jue:null, vie2:{h:"00 a 4",t:"N",c:18}, sab2:{h:"14 a 19",t:"D",c:12} }
  }
];

const ADMIN_PIN = "1234";
let state = { view:"list", encId:null, adminOk:false, selDay:TODAY_KEY };

const params = new URLSearchParams(window.location.search);
const ep = params.get("enc");
if (ep) { const id = parseInt(ep); if (id>=1&&id<=6){ state.view="detail"; state.encId=id; } }

function ini(n){ return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }
function pct(e){ return Math.min(100, Math.round(e.hechas/e.obj*100)); }
function tot(){ return ENC.reduce((s,e)=>s+e.hechas,0); }
function getDia(k){ return DIAS.find(d=>d.key===k); }

function renderList(){
  const t = tot(), tp = Math.min(100, Math.round(t/600*100));
  return `
  <div class="top-bar">
    <h1>Cronograma de campo</h1>
    <p>Vie 12/6 – Sab 20/6 &nbsp;·&nbsp; 600 encuestas</p>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Total hechas</div><div class="stat-val">${t}</div><div class="stat-sub">de 600</div></div>
    <div class="stat"><div class="stat-label">Progreso</div><div class="stat-val">${tp}%</div><div class="stat-sub">${600-t} restantes</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${tp}%"></div></div></div>
  <div class="sec">Encuestadores</div>
  <div class="enc-list">
  ${ENC.map(e=>{const p=pct(e);return`
    <div class="enc-card" onclick="openDetail(${e.id})">
      <div class="avatar" style="background:${e.color.bg};color:${e.color.text}">${ini(e.nombre)}</div>
      <div class="enc-info">
        <div class="enc-name">${e.nombre}</div>
        <div class="enc-zona"><i class="ti ti-map-pin" style="font-size:11px;vertical-align:-1px"></i> ${e.zona} &nbsp;·&nbsp; obj. ${e.obj}</div>
      </div>
      <div class="enc-right">
        <div class="cnt">${e.hechas}</div>
        <div class="cnt-sub">${p}%</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${p}%;background:${e.color.text}"></div></div>
      </div>
      <i class="ti ti-chevron-right chev" style="margin-left:8px"></i>
    </div>`}).join("")}
  </div>`;
}

function renderDetail(e){
  const p = pct(e);
  const sd = state.selDay;
  const dia = getDia(sd);
  const t = e.turnos[sd];
  return `
  <div class="det-header">
    <button class="back-btn" onclick="goBack()" aria-label="Volver"><i class="ti ti-arrow-left"></i></button>
    <div class="avatar-lg" style="background:${e.color.bg};color:${e.color.text}">${ini(e.nombre)}</div>
    <div>
      <div class="det-name">${e.nombre}</div>
      <div class="det-zona"><i class="ti ti-map-pin" style="font-size:11px;vertical-align:-1px"></i> ${e.zona}</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Hechas</div><div class="stat-val">${e.hechas}</div><div class="stat-sub">objetivo: ${e.obj}</div></div>
    <div class="stat"><div class="stat-label">Progreso</div><div class="stat-val">${p}%</div><div class="stat-sub">${e.obj-e.hechas} restantes</div></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${e.color.text}"></div></div>
  </div>
  <div class="sec">Turno del ${dia.full}</div>
  <div style="padding:0 0.875rem 0.5rem">
    ${t
      ? `<div class="sel-banner">
           <div class="sb-lbl">${t.t==="D"?"Diurno":"Nocturno"} &nbsp;·&nbsp; ${t.c} casos planificados</div>
           <div class="sb-time">${t.h}</div>
         </div>`
      : `<div class="sel-banner libre">
           <div class="sb-lbl">${dia.full}</div>
           <div class="sb-time">Libre</div>
         </div>`
    }
  </div>
  <div class="sec">Cronograma completo &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text-3)">— tocá un día para ver el detalle</span></div>
  <div class="week-grid">
  ${DIAS.map(d=>{
    const dt = e.turnos[d.key];
    const isSel = d.key===sd;
    return `<div class="day-row${isSel?" selected":""}${!dt?" no-shift":""}" onclick="selDay('${d.key}')">
      <span class="day-date">${d.label}</span>
      ${dt
        ? `<span class="day-shift">${dt.h}</span>
           <span class="tipo-pill" style="background:${e.color.bg};color:${e.color.text}">${dt.t==="D"?"Diurno":"Noc."}</span>
           <span class="day-casos">${dt.c} casos</span>`
        : `<span class="day-shift libre-txt">libre</span>`
      }
      <i class="ti ${isSel?"ti-chevron-up":"ti-chevron-down"} chev"></i>
    </div>`;
  }).join("")}
  </div>`;
}

function renderAdmin(){
  if(!state.adminOk) return `
  <div class="pin-screen">
    <i class="ti ti-lock" style="font-size:40px;color:var(--text-3)"></i>
    <h2>Acceso coordinador</h2>
    <input type="password" class="pin-input" id="pin-in" placeholder="PIN" maxlength="6" onkeydown="if(event.key==='Enter')checkPin()"/>
    <button class="save-btn" style="max-width:160px" onclick="checkPin()">Ingresar</button>
    <span class="pin-error" id="pin-err"></span>
  </div>`;
  return `
  <div class="admin-wrap">
    <div class="admin-card">
      <h3><i class="ti ti-pencil" style="font-size:16px"></i> Actualizar encuestas hechas</h3>
      ${ENC.map(e=>`
      <div class="admin-row">
        <label>${e.nombre}<br><span style="font-size:11px;color:var(--text-3)">${e.zona} · objetivo ${e.obj}</span></label>
        <input type="number" id="inp-${e.id}" value="${e.hechas}" min="0" max="999"/>
      </div>`).join("")}
      <button class="save-btn" onclick="saveAdmin()"><i class="ti ti-device-floppy"></i> &nbsp;Guardar</button>
      <div class="save-msg" id="save-msg"></div>
    </div>
    <div class="admin-card">
      <h3><i class="ti ti-link" style="font-size:16px"></i> Links por encuestador</h3>
      ${ENC.map(e=>`
      <div class="link-row">
        <span style="font-size:13px;color:var(--text-2)">${e.nombre}</span>
        <code style="font-size:12px;color:var(--blue)">?enc=${e.id}</code>
      </div>`).join("")}
      <p style="font-size:11px;color:var(--text-3);margin-top:10px">Agregar al final de la URL del sitio</p>
    </div>
  </div>`;
}

function render(){
  const c = document.getElementById("content");
  if(state.view==="list") c.innerHTML=renderList();
  else if(state.view==="detail") c.innerHTML=renderDetail(ENC.find(e=>e.id===state.encId));
  else if(state.view==="admin") c.innerHTML=renderAdmin();
  document.getElementById("nav-enc").className = (state.view!=="admin")?"active":"";
  document.getElementById("nav-adm").className = (state.view==="admin")?"active":"";
}

function openDetail(id){ state.view="detail"; state.encId=id; state.selDay=TODAY_KEY; render(); document.querySelector(".content-scroll").scrollTop=0; }
function goBack(){ state.view="list"; render(); }
function goList(){ state.view="list"; render(); }
function goAdmin(){ state.view="admin"; render(); }
function selDay(k){
  state.selDay=k; render();
  setTimeout(()=>{ const b=document.querySelector(".sel-banner"); if(b) b.scrollIntoView({behavior:"smooth",block:"nearest"}); },40);
}
function checkPin(){
  if(document.getElementById("pin-in").value===ADMIN_PIN){ state.adminOk=true; render(); }
  else document.getElementById("pin-err").textContent="PIN incorrecto";
}
function saveAdmin(){
  ENC.forEach(e=>{ const i=document.getElementById("inp-"+e.id); if(i) e.hechas=parseInt(i.value)||0; });
  render();
  setTimeout(()=>{ const m=document.getElementById("save-msg"); if(m) m.textContent="✓ Guardado correctamente"; },40);
  setTimeout(()=>{ const m=document.getElementById("save-msg"); if(m) m.textContent=""; },2400);
}
render();
</script>
</body>
</html>
