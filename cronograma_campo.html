<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cronograma de campo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  :root{
    --bg:#f5f4f0;--surface:#fff;--border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.18);
    --text:#1a1a18;--text-2:#5c5c58;--text-3:#9c9c96;
    --blue:#1a5fd4;--blue-light:#ddeafc;--blue-mid:#4a82e0;
    --green:#2d7a4f;--green-light:#d8f0e0;
    --amber:#a05e10;--amber-light:#fdefd6;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app{max-width:420px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
  .top-bar{padding:1.25rem 1.25rem 1rem;background:var(--surface);border-bottom:0.5px solid var(--border);}
  .top-bar h1{font-size:17px;font-weight:500;}
  .top-bar p{font-size:13px;color:var(--text-2);margin-top:2px;}
  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0.875rem;}
  .stats-row.three{grid-template-columns:1fr 1fr 1fr;}
  .stat{background:var(--surface);border-radius:var(--radius-sm);padding:0.75rem 0.875rem;border:0.5px solid var(--border);}
  .stat-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;}
  .stat-val{font-size:22px;font-weight:500;margin-top:2px;line-height:1;}
  .stat-sub{font-size:11px;color:var(--text-2);margin-top:3px;}
  .stat.green{background:var(--green-light);border-color:rgba(45,122,79,0.2);}
  .stat.green .stat-label{color:var(--green);}
  .stat.green .stat-val{color:#1a4f30;}
  .stat.green .stat-sub{color:var(--green);}
  .stat.amber{background:var(--amber-light);border-color:rgba(160,94,16,0.2);}
  .stat.amber .stat-label{color:var(--amber);}
  .stat.amber .stat-val{color:#6b3d09;}
  .stat.amber .stat-sub{color:var(--amber);}
  .prog-wrap{padding:0 0.875rem 0.5rem;}
  .prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-bottom:4px;}
  .prog-bar{height:6px;border-radius:3px;background:rgba(0,0,0,0.08);overflow:hidden;}
  .prog-fill{height:100%;border-radius:3px;transition:width 0.5s;}
  .prog-bars{padding:0 0.875rem 0.75rem;display:flex;flex-direction:column;gap:6px;}
  .prog-row{display:flex;flex-direction:column;gap:3px;}
  .prog-row-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);}
  .sec{font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;padding:0.75rem 0.875rem 0.375rem;}
  .enc-list{padding:0 0.875rem 1rem;display:flex;flex-direction:column;gap:7px;}
  .enc-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:0.875rem 1rem;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.12s;}
  .enc-card:hover{background:#fafaf8;}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;}
  .enc-info{flex:1;min-width:0;}
  .enc-name{font-size:14px;font-weight:500;}
  .enc-zona{font-size:12px;color:var(--text-2);margin-top:1px;}
  .enc-right{text-align:right;flex-shrink:0;}
  .cnt{font-size:18px;font-weight:500;}
  .cnt-sub{font-size:11px;color:var(--text-3);}
  .mini-bar{height:3px;border-radius:2px;background:rgba(0,0,0,0.08);overflow:hidden;margin-top:5px;width:52px;margin-left:auto;}
  .mini-fill{height:100%;border-radius:2px;}
  .det-header{padding:1rem;background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;}
  .back-btn{background:none;border:0.5px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);font-size:18px;flex-shrink:0;}
  .avatar-lg{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;flex-shrink:0;}
  .det-name{font-size:16px;font-weight:500;}
  .det-zona{font-size:12px;color:var(--text-2);margin-top:1px;}
  .sel-banner{margin:0 0.875rem 0.5rem;border-radius:var(--radius);padding:1rem 1.25rem;background:var(--blue-light);border:1px solid rgba(26,95,212,0.2);}
  .sel-banner .sb-lbl{font-size:12px;color:var(--blue);margin-bottom:3px;}
  .sel-banner .sb-time{font-size:26px;font-weight:500;color:#0c3d8a;line-height:1;}
  .sel-banner .sb-det{font-size:13px;color:var(--blue-mid);margin-top:4px;}
  .sel-banner.libre{background:rgba(0,0,0,0.04);border-color:var(--border);}
  .sel-banner.libre .sb-lbl{color:var(--text-3);}
  .sel-banner.libre .sb-time{font-size:20px;color:var(--text-3);font-weight:400;}
  .week-grid{padding:0 0.875rem 1rem;display:flex;flex-direction:column;gap:5px;}
  .day-row{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem 0.875rem;display:flex;align-items:center;cursor:pointer;transition:background 0.1s;}
  .day-row.no-shift{opacity:0.42;}
  .day-row.selected{border:1.5px solid var(--blue);background:var(--blue-light);}
  .day-row.no-shift.selected{background:rgba(0,0,0,0.04);border-color:var(--border-strong);opacity:1;}
  .day-date{font-size:12px;color:var(--text-2);width:54px;flex-shrink:0;}
  .day-row.selected .day-date{color:var(--blue);font-weight:500;}
  .day-shift{font-size:13px;font-weight:500;flex:1;}
  .day-row.selected .day-shift{color:#0c3d8a;}
  .libre-txt{color:var(--text-3);font-weight:400;}
  .day-casos{font-size:11px;color:var(--text-3);margin-right:4px;}
  .day-hechas{font-size:13px;font-weight:500;color:var(--text-2);min-width:28px;text-align:right;}
  .day-row.selected .day-hechas{color:#0c3d8a;}
  .tipo-pill{font-size:10px;border-radius:4px;padding:2px 6px;margin:0 5px;flex-shrink:0;}
  .day-row.selected .tipo-pill{background:rgba(26,95,212,0.15)!important;color:#0c3d8a!important;}
  .chev{font-size:14px;color:var(--text-3);margin-left:4px;flex-shrink:0;}
  .day-row.selected .chev{color:var(--blue);}
  .nav{display:flex;background:var(--surface);border-top:0.5px solid var(--border);position:sticky;bottom:0;}
  .nav button{flex:1;background:none;border:none;padding:10px 0 8px;cursor:pointer;font-size:11px;color:var(--text-3);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .nav button i{font-size:21px;}
  .nav button.active{color:var(--blue);}
  .pin-screen{padding:3rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .pin-screen h2{font-size:17px;font-weight:500;}
  .pin-input{font-size:22px;text-align:center;letter-spacing:0.35em;width:150px;padding:10px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);font-family:inherit;outline:none;}
  .pin-input:focus{border-color:var(--blue);}
  .pin-error{font-size:13px;color:#b52a2a;min-height:18px;}
  .admin-wrap{padding:0.875rem;display:flex;flex-direction:column;gap:8px;}
  .admin-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;}
  .admin-card h3{font-size:14px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
  .admin-enc-block{border:0.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden;}
  .admin-enc-header{padding:0.6rem 0.875rem;display:flex;align-items:center;gap:8px;background:var(--bg);}
  .admin-enc-name{font-size:13px;font-weight:500;flex:1;}
  .admin-enc-total{font-size:12px;color:var(--text-2);}
  .admin-day-row{display:flex;align-items:center;padding:0.45rem 0.875rem;border-top:0.5px solid var(--border);gap:8px;}
  .admin-day-row.finde{background:#fffbf5;}
  .admin-day-label{font-size:12px;color:var(--text-2);flex:1;}
  .admin-day-row.finde .admin-day-label{color:var(--amber);}
  .admin-day-input{width:60px;font-size:14px;text-align:center;padding:4px 6px;border:0.5px solid var(--border-strong);border-radius:6px;font-family:inherit;outline:none;background:var(--surface);}
  .admin-day-input:focus{border-color:var(--blue);}
  .admin-day-row.libre-row{opacity:0.35;pointer-events:none;}
  .save-btn{width:100%;margin-top:8px;padding:11px;font-size:14px;font-family:inherit;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:500;}
  .save-btn:hover{opacity:0.88;}
  .save-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .save-msg{font-size:12px;text-align:center;margin-top:8px;min-height:16px;}
  .save-msg.ok{color:#2e7d32;}
  .save-msg.err{color:#b52a2a;}
  .loading{padding:3rem;text-align:center;color:var(--text-3);font-size:14px;}
  .content-scroll{flex:1;overflow-y:auto;}
</style>
</head>
<body>
<div class="app">
  <div class="content-scroll" id="content">
    <div class="loading"><i class="ti ti-loader" style="font-size:28px;display:block;margin-bottom:8px"></i>Cargando...</div>
  </div>
  <nav class="nav">
    <button id="nav-enc" class="active" onclick="goList()"><i class="ti ti-users"></i>Encuestadores</button>
    <button id="nav-adm" onclick="goAdmin()"><i class="ti ti-settings"></i>Coordinador</button>
  </nav>
</div>
<script>
const API_KEY="$2a$10$AjB/6eAdtHZacaYerVO6sue8ngeExwoF59lWnqCyTzKkjnnLRagnO";
const BIN_NAME="cronograma-campo-jobs-v2";
let BIN_ID=localStorage.getItem("jsonbin_id_v2")||null;

const DIAS=[
  {key:"vie1",label:"Vie 12/6",full:"Viernes 12 de junio",finde:true},
  {key:"sab1",label:"Sab 13/6",full:"Sábado 13 de junio",finde:true},
  {key:"dom", label:"Dom 14/6",full:"Domingo 14 de junio",finde:false},
  {key:"mar", label:"Mar 16/6",full:"Martes 16 de junio",finde:false},
  {key:"mie", label:"Mie 17/6",full:"Miércoles 17 de junio",finde:false},
  {key:"jue", label:"Jue 18/6",full:"Jueves 18 de junio",finde:false},
  {key:"vie2",label:"Vie 19/6",full:"Viernes 19 de junio",finde:true},
  {key:"sab2",label:"Sab 20/6",full:"Sábado 20 de junio",finde:true}
];
const TODAY_KEY="vie1";
const FINDE_KEYS=["vie1","sab1","vie2","sab2"];

// Enc 1,3,5: obj total 140 = 60 finde + 80 semana
// Enc 2,4,6: obj total 60 = 60 finde + 0 semana
const ENC_BASE=[
  {id:1,nombre:"Encuestador 1",zona:"Boedo",obj:140,objFinde:60,objSemana:80,
   color:{bg:"#ddeafc",text:"#1a5fd4"},
   turnos:{vie1:{h:"20 a 00",t:"N",c:15},sab1:{h:"00 a 4",t:"N",c:15},dom:{h:"20 a 1",t:"N",c:20},mar:{h:"20 a 1",t:"N",c:20},mie:{h:"20 a 1",t:"N",c:20},jue:{h:"20 a 1",t:"N",c:20},vie2:{h:"00 a 4",t:"N",c:15},sab2:{h:"20 a 00",t:"N",c:15}}},
  {id:2,nombre:"Encuestador 2",zona:"Boedo",obj:60,objFinde:60,objSemana:0,
   color:{bg:"#d8f0e0",text:"#2d7a4f"},
   turnos:{vie1:{h:"20 a 00",t:"N",c:15},sab1:{h:"00 a 4",t:"N",c:15},dom:null,mar:null,mie:null,jue:null,vie2:{h:"00 a 4",t:"N",c:15},sab2:{h:"20 a 00",t:"N",c:15}}},
  {id:3,nombre:"Encuestador 3",zona:"Palermo",obj:140,objFinde:60,objSemana:80,
   color:{bg:"#ece8fe",text:"#5b3ecb"},
   turnos:{vie1:{h:"00 a 4",t:"N",c:15},sab1:{h:"20 a 00",t:"N",c:15},dom:{h:"20 a 1",t:"N",c:20},mar:{h:"20 a 1",t:"N",c:20},mie:{h:"20 a 1",t:"N",c:20},jue:{h:"20 a 1",t:"N",c:20},vie2:{h:"20 a 00",t:"N",c:15},sab2:{h:"00 a 4",t:"N",c:15}}},
  {id:4,nombre:"Encuestador 4",zona:"Palermo",obj:60,objFinde:60,objSemana:0,
   color:{bg:"#fdefd6",text:"#a05e10"},
   turnos:{vie1:{h:"00 a 4",t:"N",c:15},sab1:{h:"20 a 00",t:"N",c:15},dom:null,mar:null,mie:null,jue:null,vie2:{h:"20 a 00",t:"N",c:15},sab2:{h:"00 a 4",t:"N",c:15}}},
  {id:5,nombre:"Encuestador 5",zona:"Núñez",obj:140,objFinde:60,objSemana:80,
   color:{bg:"#fce8f0",text:"#a02060"},
   turnos:{vie1:{h:"20 a 00",t:"N",c:15},sab1:{h:"00 a 4",t:"N",c:15},dom:{h:"20 a 1",t:"N",c:22},mar:{h:"14 a 18",t:"D",c:12},mie:{h:"20 a 1",t:"N",c:23},jue:{h:"20 a 1",t:"N",c:23},vie2:{h:"00 a 4",t:"N",c:15},sab2:{h:"20 a 00",t:"N",c:15}}},
  {id:6,nombre:"Encuestador 6",zona:"Núñez",obj:60,objFinde:60,objSemana:0,
   color:{bg:"#fce8e8",text:"#a02020"},
   turnos:{vie1:{h:"20 a 00",t:"N",c:15},sab1:{h:"00 a 4",t:"N",c:15},dom:null,mar:null,mie:null,jue:null,vie2:{h:"00 a 4",t:"N",c:18},sab2:{h:"14 a 18",t:"D",c:12}}}
];

const OBJ_TOTAL=600, OBJ_FINDE=360, OBJ_SEMANA=240;

let hechasPorDia={};
ENC_BASE.forEach(e=>{
  hechasPorDia[e.id]={};
  DIAS.forEach(d=>{hechasPorDia[e.id][d.key]=0;});
});

let ENC=ENC_BASE.map(e=>({...e}));
let state={view:"list",encId:null,adminOk:false,selDay:TODAY_KEY};

const params=new URLSearchParams(window.location.search);
const ep=params.get("enc");
if(ep){const id=parseInt(ep);if(id>=1&&id<=6){state.view="detail";state.encId=id;}}

function ini(n){return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function totalEnc(id){return Object.values(hechasPorDia[id]).reduce((s,v)=>s+v,0);}
function findeEnc(id){return FINDE_KEYS.reduce((s,k)=>s+(hechasPorDia[id][k]||0),0);}
function semanaEnc(id){return totalEnc(id)-findeEnc(id);}
function pctVal(v,obj){return obj>0?Math.min(100,Math.round(v/obj*100)):0;}
function totGlobal(){return ENC.reduce((s,e)=>s+totalEnc(e.id),0);}
function findeGlobal(){return ENC.reduce((s,e)=>s+findeEnc(e.id),0);}
function semanaGlobal(){return totGlobal()-findeGlobal();}
function getDia(k){return DIAS.find(d=>d.key===k);}

// JSONBin
async function loadData(){
  try{
    if(!BIN_ID){await createBin();}
    else{
      const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{"X-Master-Key":API_KEY}});
      if(!res.ok){await createBin();return;}
      const data=await res.json();
      applyData(data.record);
    }
  }catch(e){}
  render();
}
async function createBin(){
  try{
    const res=await fetch("https://api.jsonbin.io/v3/b",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Master-Key":API_KEY,"X-Bin-Name":BIN_NAME,"X-Bin-Private":"false"},
      body:JSON.stringify({hechasPorDia})
    });
    const data=await res.json();
    BIN_ID=data.metadata.id;
    localStorage.setItem("jsonbin_id_v2",BIN_ID);
  }catch(e){}
  render();
}
async function saveData(){
  if(!BIN_ID)await createBin();
  const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify({hechasPorDia})
  });
  if(!res.ok)throw new Error("Error");
}
function applyData(record){
  if(record.hechasPorDia){
    ENC_BASE.forEach(e=>{
      if(record.hechasPorDia[e.id]){
        DIAS.forEach(d=>{hechasPorDia[e.id][d.key]=record.hechasPorDia[e.id][d.key]||0;});
      }
    });
  }
}

// RENDER LIST
function renderList(){
  const t=totGlobal(),f=findeGlobal(),s=semanaGlobal();
  const tp=pctVal(t,OBJ_TOTAL),fp=pctVal(f,OBJ_FINDE),sp=pctVal(s,OBJ_SEMANA);
  return`
  <div class="top-bar"><h1>Cronograma de campo</h1><p>Vie 12/6 – Sab 20/6 &nbsp;·&nbsp; 600 encuestas</p></div>
  <div class="stats-row three">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val">${t}</div><div class="stat-sub">de ${OBJ_TOTAL} (${tp}%)</div></div>
    <div class="stat green"><div class="stat-label">Vie+Sáb</div><div class="stat-val">${f}</div><div class="stat-sub">de ${OBJ_FINDE} (${fp}%)</div></div>
    <div class="stat amber"><div class="stat-label">Dom–Jue</div><div class="stat-val">${s}</div><div class="stat-sub">de ${OBJ_SEMANA} (${sp}%)</div></div>
  </div>
  <div class="sec">Encuestadores</div>
  <div class="enc-list">
  ${ENC.map(e=>{
    const tot=totalEnc(e.id),f=findeEnc(e.id),s=semanaEnc(e.id);
    const tp=pctVal(tot,e.obj),fp=pctVal(f,e.objFinde),sp=e.objSemana>0?pctVal(s,e.objSemana):null;
    return`<div class="enc-card" onclick="openDetail(${e.id})">
      <div class="avatar" style="background:${e.color.bg};color:${e.color.text}">${ini(e.nombre)}</div>
      <div class="enc-info">
        <div class="enc-name">${e.nombre}</div>
        <div class="enc-zona"><i class="ti ti-map-pin" style="font-size:11px;vertical-align:-1px"></i> ${e.zona}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:3px">
          <span style="color:var(--green)">V+S ${f}/${e.objFinde}</span>
          ${sp!==null?`&nbsp;·&nbsp;<span style="color:var(--amber)">D–J ${s}/${e.objSemana}</span>`:""}
        </div>
      </div>
      <div class="enc-right">
        <div class="cnt">${tot}</div>
        <div class="cnt-sub">de ${e.obj}</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${tp}%;background:${e.color.text}"></div></div>
      </div>
      <i class="ti ti-chevron-right chev" style="margin-left:8px"></i>
    </div>`;
  }).join("")}
  </div>`;
}

// RENDER DETAIL
function renderDetail(e){
  const tot=totalEnc(e.id),f=findeEnc(e.id),s=semanaEnc(e.id);
  const tp=pctVal(tot,e.obj),fp=pctVal(f,e.objFinde),sp=e.objSemana>0?pctVal(s,e.objSemana):null;
  const sd=state.selDay,dia=getDia(sd),t=e.turnos[sd],hDay=hechasPorDia[e.id][sd];
  return`
  <div class="det-header">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <div class="avatar-lg" style="background:${e.color.bg};color:${e.color.text}">${ini(e.nombre)}</div>
    <div><div class="det-name">${e.nombre}</div><div class="det-zona"><i class="ti ti-map-pin" style="font-size:11px;vertical-align:-1px"></i> ${e.zona}</div></div>
  </div>
  <div class="stats-row three">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val">${tot}</div><div class="stat-sub">de ${e.obj} (${tp}%)</div></div>
    <div class="stat green"><div class="stat-label">Vie+Sáb</div><div class="stat-val">${f}</div><div class="stat-sub">de ${e.objFinde} (${fp}%)</div></div>
    <div class="stat amber"><div class="stat-label">Dom–Jue</div><div class="stat-val">${s}</div><div class="stat-sub">${sp!==null?`de ${e.objSemana} (${sp}%)`:"no aplica"}</div></div>
  </div>
  <div class="prog-bars">
    <div class="prog-row">
      <div class="prog-row-label"><span style="color:var(--green)">Vie+Sáb</span><span>${f}/${e.objFinde}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${fp}%;background:var(--green)"></div></div>
    </div>
    ${sp!==null?`<div class="prog-row">
      <div class="prog-row-label"><span style="color:var(--amber)">Dom–Jue</span><span>${s}/${e.objSemana}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${sp}%;background:var(--amber)"></div></div>
    </div>`:""}
  </div>
  <div class="sec">Turno del ${dia.full}</div>
  <div style="padding:0 0.875rem 0.5rem">
    ${t
      ?`<div class="sel-banner">
          <div class="sb-lbl">${t.t==="D"?"Diurno":"Nocturno"} &nbsp;·&nbsp; ${t.c} casos planificados</div>
          <div class="sb-time">${t.h}</div>
          <div class="sb-det">Realizadas este día: <strong>${hDay}</strong></div>
        </div>`
      :`<div class="sel-banner libre"><div class="sb-lbl">${dia.full}</div><div class="sb-time">Libre</div></div>`}
  </div>
  <div class="sec">Cronograma completo &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text-3)">— tocá un día para ver el detalle</span></div>
  <div class="week-grid">
  ${DIAS.map(d=>{
    const dt=e.turnos[d.key],isSel=d.key===sd,h=hechasPorDia[e.id][d.key];
    return`<div class="day-row${isSel?" selected":""}${!dt?" no-shift":""}" onclick="selDay('${d.key}')">
      <span class="day-date">${d.label}</span>
      ${dt
        ?`<span class="day-shift">${dt.h}</span>
          <span class="tipo-pill" style="background:${e.color.bg};color:${e.color.text}">${dt.t==="D"?"Diurno":"Noc."}</span>
          <span class="day-casos">${dt.c} pl.</span>
          <span class="day-hechas">${h}</span>`
        :`<span class="day-shift libre-txt">libre</span>`}
      <i class="ti ${isSel?"ti-chevron-up":"ti-chevron-down"} chev"></i>
    </div>`;
  }).join("")}
  </div>`;
}

// RENDER ADMIN
function renderAdmin(){
  if(!state.adminOk)return`
  <div class="pin-screen">
    <i class="ti ti-lock" style="font-size:40px;color:var(--text-3)"></i>
    <h2>Acceso coordinador</h2>
    <input type="password" class="pin-input" id="pin-in" placeholder="PIN" maxlength="6" onkeydown="if(event.key==='Enter')checkPin()"/>
    <button class="save-btn" style="max-width:160px" onclick="checkPin()">Ingresar</button>
    <span class="pin-error" id="pin-err"></span>
  </div>`;
  return`<div class="admin-wrap">
    <div class="admin-card">
      <h3><i class="ti ti-pencil" style="font-size:16px"></i> Cargar encuestas por día</h3>
      ${ENC.map(e=>`
      <div class="admin-enc-block">
        <div class="admin-enc-header">
          <div class="avatar" style="width:28px;height:28px;font-size:11px;background:${e.color.bg};color:${e.color.text}">${ini(e.nombre)}</div>
          <span class="admin-enc-name">${e.nombre} <span style="font-size:11px;color:var(--text-3)">${e.zona}</span></span>
          <span class="admin-enc-total">Total: <strong id="tot-${e.id}">${totalEnc(e.id)}</strong> / ${e.obj}</span>
        </div>
        ${DIAS.map(d=>{
          const dt=e.turnos[d.key];
          return`<div class="admin-day-row${d.finde?" finde":""}${!dt?" libre-row":""}">
            <span class="admin-day-label">${d.label}${dt?" · "+dt.h:""}</span>
            <input type="number" class="admin-day-input" id="i-${e.id}-${d.key}"
              value="${hechasPorDia[e.id][d.key]}" min="0" max="999"
              ${!dt?"disabled":""}
              oninput="updateTotal(${e.id})"/>
          </div>`;
        }).join("")}
      </div>`).join("")}
      <button class="save-btn" id="save-btn" onclick="saveAdmin()"><i class="ti ti-device-floppy"></i> &nbsp;Guardar en la nube</button>
      <div class="save-msg" id="save-msg"></div>
    </div>
  </div>`;
}

function updateTotal(encId){
  let sum=0;
  DIAS.forEach(d=>{const inp=document.getElementById(`i-${encId}-${d.key}`);if(inp)sum+=parseInt(inp.value)||0;});
  const el=document.getElementById(`tot-${encId}`);if(el)el.textContent=sum;
}

function render(){
  const c=document.getElementById("content");
  if(state.view==="list")c.innerHTML=renderList();
  else if(state.view==="detail")c.innerHTML=renderDetail(ENC.find(e=>e.id===state.encId));
  else if(state.view==="admin")c.innerHTML=renderAdmin();
  document.getElementById("nav-enc").className=(state.view!=="admin")?"active":"";
  document.getElementById("nav-adm").className=(state.view==="admin")?"active":"";
}

function openDetail(id){state.view="detail";state.encId=id;state.selDay=TODAY_KEY;render();document.querySelector(".content-scroll").scrollTop=0;}
function goBack(){state.view="list";render();}
function goList(){state.view="list";render();}
function goAdmin(){state.view="admin";render();}
function selDay(k){state.selDay=k;render();setTimeout(()=>{const b=document.querySelector(".sel-banner");if(b)b.scrollIntoView({behavior:"smooth",block:"nearest"});},40);}
function checkPin(){
  if(document.getElementById("pin-in").value==="1234"){state.adminOk=true;render();}
  else document.getElementById("pin-err").textContent="PIN incorrecto";
}
async function saveAdmin(){
  const btn=document.getElementById("save-btn"),msg=document.getElementById("save-msg");
  btn.disabled=true;btn.textContent="Guardando...";
  ENC.forEach(e=>{DIAS.forEach(d=>{const inp=document.getElementById(`i-${e.id}-${d.key}`);if(inp)hechasPorDia[e.id][d.key]=parseInt(inp.value)||0;});});
  try{
    await saveData();
    msg.className="save-msg ok";msg.textContent="✓ Guardado en la nube";
  }catch(err){
    msg.className="save-msg err";msg.textContent="✗ Error al guardar. Reintentá.";
  }
  btn.disabled=false;btn.innerHTML='<i class="ti ti-device-floppy"></i> &nbsp;Guardar en la nube';
  setTimeout(()=>{if(msg)msg.textContent="";},3000);
}

loadData();
</script>
</body>
</html>
